<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试网易云音乐搜索API</title>
</head>
<body>
    <h1>测试网易云音乐搜索API</h1>
    <div>
        <input type="text" id="searchKeyword" placeholder="输入搜索关键词" value="周杰伦">
        <button onclick="searchMusic()">搜索</button>
    </div>
    <div id="result"></div>

    <script>
        async function searchMusic() {
            const keyword = document.getElementById('searchKeyword').value;
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '搜索中...';

            try {
                const response = await fetch(`https://api.injahow.cn/meting/?server=netease&type=search&keyword=${encodeURIComponent(keyword)}&limit=5`);
                const data = await response.json();
                resultDiv.innerHTML = '<h2>搜索结果:</h2>' + JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.innerHTML = '<h2>搜索失败:</h2>' + error.message;
            }
        }

        // 页面加载时自动搜索
        window.onload = searchMusic;
    </script>
</body>
</html>
