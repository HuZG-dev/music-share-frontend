<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>完整测试发布分享流程</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        .step {
            background: #f8f9fa;
            padding: 25px;
            margin: 20px 0;
            border-radius: 12px;
            border-left: 4px solid #667eea;
        }
        .step h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 20px;
            display: flex;
            align-items: center;
        }
        .step-number {
            background: #667eea;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 5px 5px 5px 0;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .result {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        .info {
            background: #d1ecf1;
            border: 1px solid #bee5eb;
            color: #0c5460;
        }
        .warning {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            color: #856404;
        }
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }
        .status.pending { background: #ffeaa7; color: #856404; }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 完整测试发布分享流程</h1>
        <p class="subtitle">按顺序执行每个步骤，解决发布分享 403 问题</p>

        <!-- 步骤0: 清除旧数据 -->
        <div class="step">
            <h2><span class="step-number">0</span>清除旧Token</h2>
            <button onclick="clearOldData()">清除 localStorage</button>
            <div id="clearResult"></div>
        </div>

        <!-- 步骤1: 登录 -->
        <div class="step">
            <h2>
                <span class="step-number">1</span>用户登录
                <span class="status pending" id="loginStatus">待执行</span>
            </h2>
            <input type="text" id="phone" placeholder="手机号" value="13812345678">
            <input type="password" id="password" placeholder="密码" value="123456">
            <button onclick="login()">登录</button>
            <div id="loginResult"></div>
        </div>

        <!-- 步骤2: 创建分享 -->
        <div class="step">
            <h2>
                <span class="step-number">2</span>创建分享
                <span class="status pending" id="createStatus">待执行</span>
            </h2>
            <input type="text" id="musicTitle" placeholder="音乐标题" value="晴天">
            <input type="text" id="musicArtist" placeholder="歌手" value="周杰伦">
            <textarea id="content" placeholder="分享内容" rows="3">这是一首非常好听的歌曲，推荐给大家！</textarea>
            <button onclick="createShare()" id="createBtn" disabled>创建分享</button>
            <div id="createResult"></div>
        </div>

        <!-- 步骤3: 验证结果 -->
        <div class="step">
            <h2>
                <span class="step-number">3</span>验证结果
                <span class="status pending" id="verifyStatus">待执行</span>
            </h2>
            <button onclick="verifyShare()">获取所有分享</button>
            <div id="verifyResult"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080';
        let token = null;
        let createdShareId = null;

        // 步骤0: 清除旧数据
        function clearOldData() {
            const resultDiv = document.getElementById('clearResult');
            try {
                const oldToken = localStorage.getItem('token');
                localStorage.clear();
                sessionStorage.clear();
                
                if (oldToken) {
                    resultDiv.innerHTML = `<div class="result warning">✓ 已清除旧Token\n旧Token前50字符: ${oldToken.substring(0, 50)}...\n请点击"登录"按钮获取新Token</div>`;
                } else {
                    resultDiv.innerHTML = `<div class="result info">✓ localStorage 已清空\n未发现旧Token</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="result error">✗ 清除失败: ${error.message}</div>`;
            }
        }

        // 步骤1: 登录
        async function login() {
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('loginResult');
            const statusSpan = document.getElementById('loginStatus');

            statusSpan.textContent = '执行中...';
            statusSpan.className = 'status pending';

            try {
                console.log('🔐 开始登录...');
                const response = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, password })
                });

                const data = await response.json();
                console.log('📥 登录响应:', data);

                if (data.code === 200 && data.data.token) {
                    token = data.data.token;
                    localStorage.setItem('token', token);
                    
                    resultDiv.innerHTML = `<div class="result success">✓ 登录成功！
用户: ${data.data.user.nickname || phone}
Token(前50字符): ${token.substring(0, 50)}...
Token(后20字符): ...${token.substring(token.length - 20)}

完整Token已保存到 localStorage</div>`;
                    
                    statusSpan.textContent = '成功';
                    statusSpan.className = 'status success';
                    document.getElementById('createBtn').disabled = false;
                    document.getElementById('createStatus').textContent = '可执行';
                } else {
                    throw new Error(data.message || '登录失败');
                }
            } catch (error) {
                console.error('❌ 登录错误:', error);
                resultDiv.innerHTML = `<div class="result error">✗ 登录失败: ${error.message}</div>`;
                statusSpan.textContent = '失败';
                statusSpan.className = 'status error';
            }
        }

        // 步骤2: 创建分享
        async function createShare() {
            const resultDiv = document.getElementById('createResult');
            const statusSpan = document.getElementById('createStatus');
            
            if (!token) {
                resultDiv.innerHTML = '<div class="result error">✗ 请先登录！</div>';
                return;
            }

            statusSpan.textContent = '执行中...';
            statusSpan.className = 'status pending';

            const shareData = {
                musicId: '186016',
                musicTitle: document.getElementById('musicTitle').value,
                musicArtist: document.getElementById('musicArtist').value,
                musicAlbum: '叶惠美',
                musicCover: 'https://p1.music.126.net/W4E4Xn7MZ3qT9Fy4a1dKmA==/109951164364721727.jpg',
                content: document.getElementById('content').value,
                tags: '流行,经典',
                privacy: 'public'
            };

            try {
                console.log('📤 发送创建分享请求...');
                console.log('数据:', shareData);
                console.log('Token:', token);

                const response = await fetch(`${API_BASE}/api/shares`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(shareData)
                });

                console.log('📥 响应状态:', response.status);
                const data = await response.json();
                console.log('📥 响应数据:', data);

                if (response.status === 200 && data.code === 200) {
                    createdShareId = data.data.id;
                    resultDiv.innerHTML = `<div class="result success">✓ 创建分享成功！
分享ID: ${data.data.id}
音乐: ${data.data.musicTitle} - ${data.data.musicArtist}
内容: ${data.data.content}
创建时间: ${data.data.createdAt || '刚刚'}

完整响应:
${JSON.stringify(data, null, 2)}</div>`;
                    
                    statusSpan.textContent = '成功';
                    statusSpan.className = 'status success';
                    document.getElementById('verifyStatus').textContent = '可执行';
                } else if (response.status === 403) {
                    throw new Error(`403 Forbidden - Token验证失败\n响应: ${JSON.stringify(data, null, 2)}`);
                } else {
                    throw new Error(`${data.message || '创建失败'}\n响应: ${JSON.stringify(data, null, 2)}`);
                }
            } catch (error) {
                console.error('❌ 创建分享错误:', error);
                resultDiv.innerHTML = `<div class="result error">✗ 创建分享失败: ${error.message}</div>`;
                statusSpan.textContent = '失败';
                statusSpan.className = 'status error';
            }
        }

        // 步骤3: 验证结果
        async function verifyShare() {
            const resultDiv = document.getElementById('verifyResult');
            const statusSpan = document.getElementById('verifyStatus');

            statusSpan.textContent = '执行中...';
            statusSpan.className = 'status pending';

            try {
                console.log('📥 获取所有分享...');
                const response = await fetch(`${API_BASE}/api/shares`);
                const data = await response.json();

                if (data.code === 200) {
                    const shares = data.data || [];
                    const latestShares = shares.slice(-5).reverse();
                    
                    let shareList = latestShares.map((s, i) => 
                        `${i + 1}. ID:${s.id} - ${s.musicTitle} (${s.musicArtist})`
                    ).join('\n');

                    resultDiv.innerHTML = `<div class="result success">✓ 验证成功！
总分享数: ${shares.length}
最新5条分享:
${shareList}

${createdShareId ? `你刚创建的分享ID ${createdShareId} ${shares.find(s => s.id === createdShareId) ? '✓ 已找到' : '✗ 未找到'}` : ''}</div>`;
                    
                    statusSpan.textContent = '成功';
                    statusSpan.className = 'status success';
                } else {
                    throw new Error(data.message || '获取失败');
                }
            } catch (error) {
                console.error('❌ 验证错误:', error);
                resultDiv.innerHTML = `<div class="result error">✗ 验证失败: ${error.message}</div>`;
                statusSpan.textContent = '失败';
                statusSpan.className = 'status error';
            }
        }

        // 页面加载时检查
        window.onload = function() {
            const oldToken = localStorage.getItem('token');
            if (oldToken) {
                document.getElementById('clearResult').innerHTML = 
                    `<div class="result warning">⚠️ 检测到旧Token！\n前50字符: ${oldToken.substring(0, 50)}...\n\n请先点击"清除 localStorage"按钮！</div>`;
            }
        };
    </script>
</body>
</html>
